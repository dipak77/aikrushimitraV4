# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint


  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/web/out/

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/web/out/
      - name: Start server
        run: npm start &
        env:
          SKIP_ENV_VALIDATION: true
      - name: Wait for server to be ready
        run: sleep 5 && npx wait-on http://localhost:3000 --timeout 30000
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/crops/soybean/
          budgetPath: .github/lighthouse-budget.json

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run security audit (warnings only for high/moderate)
        run: npm audit --audit-level=high || true
      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=critical

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, lighthouse, security-scan]
    if: github.ref == 'refs/heads/main'
    env:
      FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AIKRUSHIMITRAV1 || secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/web/out/
      - name: Deploy to Firebase Hosting (Staging)
        if: ${{ env.FIREBASE_SA != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SA }}
          projectId: aikrushimitrav1
          channelId: staging

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AIKRUSHIMITRAV1 || secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/web/out/
      - name: Deploy to Firebase Hosting (Production)
        if: ${{ env.FIREBASE_SA != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SA }}
          projectId: aikrushimitrav1
          channelId: live



